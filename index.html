            { id: 3.13, level: "Thông hiểu", question: "Yếu tố nào sau đây KHÔNG làm thay đổi thế năng trọng trường của một vật?", options: ["Thay đổi khối lượng.", "Thay đổi độ cao.", "Thay đổi tốc độ.", "Thay đổi vị trí mốc thế năng."], correct: 2, explanation: "Tốc độ chỉ ảnh hưởng động năng, không ảnh hưởng thế năng trọng trường." },
            { id: 3.14, level: "Thông hiểu", question: "Tại sao nước ở trên đỉnh thác cao lại có khả năng thực hiện công lớn khi chảy xuống?", options: ["Vì ở trên cao nước có thế năng trọng trường lớn.", "Vì nước ở trên cao có tốc độ rất lớn.", "Vì nước ở trên cao có khối lượng lớn hơn ở dưới.", "Vì nước ở trên cao có nhiệt độ cao."], correct: 0, explanation: "Độ cao lớn tạo ra thế năng trọng trường lớn có khả năng thực hiện công lớn." },
            { id: 3.15, level: "Thông hiểu", question: "Hai bình chứa nước giống hệt nhau, bình 1 chứa đầy nước, bình 2 chứa một nửa nước và được đặt cùng một độ cao. So sánh thế năng trọng trường của hai bình nước?", options: ["Bình 1 có thế năng lớn hơn bình 2.", "Bình 2 có thế năng lớn hơn bình 1.", "Hai bình có thế năng bằng nhau.", "Thế năng hai bình đều bằng không."], correct: 0, explanation: "Bình 1 đầy nước nên khối lượng lớn hơn, dẫn đến thế năng lớn hơn." },
            { id: 3.16, level: "Thông hiểu", question: "Một vật đang chuyển động trên mặt đất (chọn mặt đất làm mốc thế năng) thì cơ năng của vật", options: ["bằng động năng của vật.", "bằng thế năng của vật.", "bằng không.", "nhỏ hơn động năng."], correct: 0, explanation: "Trên mặt đất $h=0 \Rightarrow W_t=0 \Rightarrow W = W_đ + 0 = W_đ$." },
            { id: 3.17, level: "Vận dụng", question: "Một vận động viên khối lượng 70 kg đang chạy với tốc độ 4 m/s. Động năng của vận động viên là", options: ["280 J.", "140 J.", "560 J.", "1120 J."], correct: 2, explanation: "$W_đ = 0,5 \cdot 70 \cdot 4^2 = 560$ J." },
            { id: 3.18, level: "Vận dụng", question: "Một hòn đá trọng lượng 20 N được đưa lên độ cao 3 m so với mốc thế năng. Thế năng của hòn đá là", options: ["6 J.", "60 J.", "23 J.", "600 J."], correct: 1, explanation: "$W_t = P \cdot h = 20 \cdot 3 = 60$ J." },
            { id: 3.19, level: "Vận dụng", question: "Một chiếc xe điện đồ chơi nặng 2 kg có động năng 16 J. Tốc độ của xe là", options: ["8 m/s.", "4 m/s.", "16 m/s.", "2 m/s."], correct: 1, explanation: "$16 = 0,5 \cdot 2 \cdot v^2 \Rightarrow v^2 = 16 \Rightarrow v = 4$ m/s." },
            { id: 3.20, level: "Vận dụng", question: "Một vật có khối lượng 1 kg có thế năng trọng trường là 50 J. Biết trọng lượng vật gấp 10 lần khối lượng, độ cao của vật so với mốc là", options: ["5 m.", "50 m.", "0,5 m.", "10 m."], correct: 0, explanation: "$P = 10 \cdot 1 = 10$ N. $h = W_t / P = 50 / 10 = 5$ m." },
            { id: 3.21, level: "Vận dụng", question: "Một quả bóng 500 g được ném lên cao, tại vị trí có tốc độ 2 m/s và độ cao 1,5 m so với mặt đất. Biết trọng lượng quả bóng là 5 N. Cơ năng của quả bóng so với mặt đất là", options: ["1 J.", "7,5 J.", "8,5 J.", "12,5 J."], correct: 2, explanation: "$W_đ = 1$ J, $W_t = 7,5$ J $\Rightarrow W = 8,5$ J." },
            { id: 3.22, level: "Vận dụng", question: "Khi ta thả một quả bóng từ trên cao xuống mặt sàn, trong quá trình rơi đã có sự chuyển hóa năng lượng như thế nào?", options: ["Động năng chuyển hóa thành thế năng.", "Thế năng chuyển hóa thành động năng.", "Nhiệt năng chuyển hóa thành cơ năng.", "Cơ năng chuyển hóa thành hóa năng."], correct: 1, explanation: "Rơi xuống h giảm (Wt giảm), v tăng (Wđ tăng) nên thế năng chuyển thành động năng." },
            { id: 3.23, level: "Vận dụng", question: "Một người đạp xe lên dốc, tốc độ của xe giảm dần. Khi đó", options: ["động năng giảm, thế năng tăng.", "động năng tăng, thế năng giảm.", "cả động năng và thế năng đều tăng.", "cả động năng và thế năng đều giảm."], correct: 0, explanation: "Lên dốc h tăng (Wt tăng), tốc độ giảm (Wđ giảm)." },
            { id: 3.24, level: "Vận dụng", question: "Tại sao khi xây dựng các đập thủy điện, người ta phải xây đập rất cao và tích nước ở hồ chứa phía trên?", options: ["Để nước chảy đẹp hơn.", "Để tăng thế năng trọng trường của nước, tạo ra động năng lớn làm quay tuabin.", "Để nuôi được nhiều cá hơn trong hồ.", "Để tiết kiệm diện tích đất ở phía dưới."], correct: 1, explanation: "Tích nước ở cao để tạo thế năng lớn, sau đó chuyển thành động năng mạnh quay tuabin." }
        ],
        truefalse: [
            { id: 3.25, level: "Biết-Hiểu", context: "Một bạn nhỏ đang chơi xích đu, khi xích đu chuyển động từ vị trí cao nhất về vị trí thấp nhất.", statements: ["Tại vị trí cao nhất, xích đu có thế năng trọng trường lớn nhất.", "Khi chuyển động từ cao xuống thấp, thế năng giảm dần và động năng tăng dần.", "Tại vị trí thấp nhất, cơ năng của xích đu bằng không.", "Thế năng của xích đu chỉ phụ thuộc vào cân nặng mà không phụ thuộc độ cao."], pattern: [true, true, false, false], explanations: ["Đúng vì độ cao cực đại.", "Đúng vì có sự chuyển hóa.", "Sai vì vẫn có động năng lớn nhất.", "Sai vì phụ thuộc cả m và h."] },
            { id: 3.26, level: "Biết-Vận dụng", context: "Một vật có khối lượng 4 kg đang chuyển động trên mặt sàn nằm ngang với tốc độ không đổi 3 m/s.", statements: ["Động năng của vật có giá trị là 18 J.", "Vì vật chuyển động trên mặt sàn nên cơ năng của vật luôn bằng không.", "Nếu tốc độ của vật tăng lên gấp đôi thì động năng tăng lên gấp bốn lần.", "Công thức tính động năng của vật là $W_đ = 0,5mv^2$."], pattern: [true, false, true, true], explanations: ["Đúng: $0,5 \cdot 4 \cdot 3^2 = 18$.", "Sai vì vật có động năng.", "Đúng vì tỉ lệ với bình phương v.", "Đúng."] },
            { id: 3.27, level: "Hiểu-Vận dụng", context: "Một quả táo có khối lượng 200 g nằm yên trên cành cao 3 m. Trọng lượng là 2 N.", statements: ["Quả táo đang có thế năng trọng trường là 6 J.", "Vì quả táo nằm yên nên cơ năng của quả táo bằng không.", "Nếu quả táo bị rơi, cơ năng của quả táo (bỏ qua sức cản) là không đổi.", "Thế năng của quả táo tăng dần khi nó rơi gần đến mặt đất."], pattern: [true, false, true, false], explanations: ["Đúng: $2 \cdot 3 = 6$.", "Sai vì có thế năng.", "Đúng (bảo toàn).", "Sai vì h giảm thì Wt giảm."] },
            { id: 3.28, level: "Biết-Vận dụng", context: "Vận động viên 600 N đứng ở bục nhảy cao 10 m.", statements: ["Thế năng của vận động viên là 6000 J.", "Tại mặt nước thế năng của người đó là 600 J.", "Công thức xác định thế năng trọng trường là $W_t=Ph$.", "Động năng của vận động viên khi đứng yên trên bục nhảy là 6000 J."], pattern: [true, false, true, false], explanations: ["Đúng.", "Sai vì tại mốc Wt=0.", "Đúng.", "Sai vì v=0 nên Wđ=0."] }
        ],
        short: [
            { id: 3.33, level: "Vận dụng", question: "Một vật có khối lượng 5 kg đang chuyển động với tốc độ 4 m/s. Động năng của vật là bao nhiêu joule?", answer: "40", explanation: "$0,5 \cdot 5 \cdot 4^2 = 40$ J." },
            { id: 3.34, level: "Vận dụng", question: "Một vật có trọng lượng 150 N được đưa lên độ cao 2 m. Thế năng trọng trường là bao nhiêu joule?", answer: "300", explanation: "$150 \cdot 2 = 300$ J." },
            { id: 3.35, level: "Vận dụng", question: "Động năng 25 J và thế năng 45 J. Cơ năng của vật là bao nhiêu joule?", answer: "70", explanation: "$25 + 45 = 70$ J." },
            { id: 3.37, level: "Hiểu", question: "Cho các nhận định:\n1. Thế năng tỉ lệ thuận khối lượng.\n2. Tốc độ càng lớn động năng luôn càng lớn.\n3. Động năng có thể âm.\n4. Thế năng phụ thuộc mốc.\n5. Cơ năng có đơn vị là N.\n6. Vật nằm yên trên đất cơ năng luôn 0.\n7. Khi rơi, thế năng chuyển hóa thành động năng.\n8. $W = W_đ + W_t$.\nNhập dãy số nhận định ĐÚNG tăng dần.", answer: "1478", explanation: "Các ý 1, 4, 7, 8 đúng bản chất." }
        ]
    };

    let currentQuestions = [];
    let currentIdx = 0;
    let userAnswers = [];
    let gameMode = 'practice';
    let timerInterval = null;
    let timeRemaining = 0;
    let isFinished = false;

    const startApp = (mode) => {
        const user = {
            sbd: document.getElementById('input-sbd').value.trim(),
            name: document.getElementById('input-name').value.trim(),
            class: document.getElementById('input-class').value.trim(),
            school: document.getElementById('input-school').value.trim()
        };
        if(!user.name || !user.sbd) {
            showModal("Lỗi", "Vui lòng nhập Họ tên và Số báo danh!");
            return;
        }
        localStorage.setItem('quiz_user', JSON.stringify(user));
        gameMode = mode;
        isFinished = false;
        currentQuestions = generateQuizSet();
        userAnswers = new Array(currentQuestions.length).fill(null);
        currentIdx = 0;
        document.getElementById('screen-welcome').classList.remove('active');
        document.getElementById('screen-quiz').classList.add('active');
        document.getElementById('user-bar').style.display = 'flex';
        document.getElementById('display-user').innerText = `${user.name} - ${user.sbd}`;
        if(mode === 'exam') {
            document.getElementById('exam-warning').style.display = 'block';
            document.documentElement.requestFullscreen().catch(() => {});
            document.addEventListener("visibilitychange", handleCheat);
            window.addEventListener("blur", handleCheat);
        }
        renderQuestion();
        startTimer();
    };

    const generateQuizSet = () => {
        let p1 = [...BANK.mcq].sort(() => 0.5 - Math.random()).slice(0, 12);
        let p2 = [...BANK.truefalse].sort(() => 0.5 - Math.random()).slice(0, 4);
        let p3 = [...BANK.short].sort(() => 0.5 - Math.random()).slice(0, 4);
        p1.forEach(q => {
            let opts = q.options.map((o, i) => ({ text: o, originalIdx: i }));
            opts.sort(() => 0.5 - Math.random());
            q.shuffledOptions = opts;
            q.shuffledCorrect = opts.findIndex(o => o.originalIdx === q.correct);
        });
        p2.forEach(q => {
            let statements = q.statements.map((s, i) => ({ text: s, originalVal: q.pattern[i], originalExp: q.explanations[i] }));
            statements.sort(() => 0.5 - Math.random());
            q.shuffledStatements = statements;
        });
        return [...p1, ...p2, ...p3];
    };

    const renderQuestion = () => {
        const container = document.getElementById('question-container');
        const q = currentQuestions[currentIdx];
        let html = '';
        const part = currentIdx < 12 ? "PHẦN I" : (currentIdx < 16 ? "PHẦN II" : "PHẦN III");
        const num = currentIdx < 12 ? (currentIdx + 1) : (currentIdx < 16 ? (currentIdx - 11) : (currentIdx - 15));
        html += `<div class="question-slide"><div class="question-meta">${part} - Câu ${num} [${q.level}]</div>`;
        if(q.shuffledOptions) {
            html += `<div class="question-text">${q.question}</div><div class="options-list">`;
            q.shuffledOptions.forEach((opt, i) => {
                html += `<div class="option-item ${userAnswers[currentIdx] === i ? 'selected' : ''}" data-idx="${i}">
                    <div class="option-label">${String.fromCharCode(65+i)}</div><div>${opt.text}</div></div>`;
            });
            html += `</div>`;
        } else if(q.shuffledStatements) {
            html += `<div class="question-text">${q.context}</div><div class="tf-container">`;
            q.shuffledStatements.forEach((stmt, i) => {
                const ans = userAnswers[currentIdx] ? userAnswers[currentIdx][i] : null;
                html += `<div class="tf-row">
                    <div class="tf-text">${String.fromCharCode(97+i)}) ${stmt.text}</div>
                    <div class="tf-btns">
                        <button class="tf-btn ${ans === true ? 'active-true' : ''}" data-sidx="${i}" data-val="true">Đúng</button>
                        <button class="tf-btn ${ans === false ? 'active-false' : ''}" data-sidx="${i}" data-val="false">Sai</button>
                    </div></div>`;
            });
            html += `</div>`;
        } else {
            html += `<div class="question-text">${q.question}</div>
                <input type="text" class="short-answer-input" id="short-inp" value="${userAnswers[currentIdx] || ''}">`;
        }
        container.innerHTML = html + `</div>`;
        document.getElementById('btn-prev').disabled = currentIdx === 0;
        document.getElementById('btn-next').style.display = currentIdx === 19 ? 'none' : 'block';
        document.getElementById('btn-submit').style.display = currentIdx === 19 ? 'block' : 'none';
        if(window.MathJax) MathJax.typesetPromise();
        attachListeners();
    };

    const attachListeners = () => {
        document.querySelectorAll('.option-item').forEach(el => el.onclick = () => {
            if(isFinished) return;
            userAnswers[currentIdx] = parseInt(el.dataset.idx);
            playSound('ping'); renderQuestion();
        });
        document.querySelectorAll('.tf-btn').forEach(el => el.onclick = () => {
            if(isFinished) return;
            if(!userAnswers[currentIdx]) userAnswers[currentIdx] = {};
            userAnswers[currentIdx][el.dataset.sidx] = el.dataset.val === 'true';
            playSound('ping'); renderQuestion();
        });
        const inp = document.getElementById('short-inp');
        if(inp) inp.oninput = (e) => userAnswers[currentIdx] = e.target.value;
    };

    const startTimer = () => {
        resetTimer();
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if(isFinished) return;
            timeRemaining--;
            if(timeRemaining <= 0) currentIdx === 19 ? finishQuiz() : nextQuestion();
            updateTimerDisplay();
        }, 1000);
    };

    const resetTimer = () => {
        timeRemaining = currentIdx < 12 ? 90 : 120;
        updateTimerDisplay();
    };

    const updateTimerDisplay = () => {
        const m = Math.floor(timeRemaining/60), s = timeRemaining%60;
        document.getElementById('timer-display').innerText = `${m}:${s<10?'0'+s:s}`;
    };

    const handleCheat = () => {
        if(gameMode === 'exam' && !isFinished) {
            isFinished = true;
            showModal("CẢNH BÁO", "Bạn đã rời khỏi trang. Hệ thống tự động nộp bài.");
            setTimeout(finishQuiz, 2000);
        }
    };

    const nextQuestion = () => { if(currentIdx < 19) { currentIdx++; renderQuestion(); resetTimer(); } };
    const prevQuestion = () => { if(currentIdx > 0) { currentIdx--; renderQuestion(); resetTimer(); } };

    const finishQuiz = async () => {
        if(isFinished && gameMode !== 'exam') return;
        isFinished = true;
        clearInterval(timerInterval);
        playSound('finish');
        if(document.fullscreenElement) document.exitFullscreen();
        let score = 0;
        currentQuestions.forEach((q, idx) => {
            const ans = userAnswers[idx];
            if(idx < 12) { if(ans === q.shuffledCorrect) score += 0.25; }
            else if(idx < 16) {
                let c = 0; q.shuffledStatements.forEach((s, si) => { if(ans && ans[si] === s.originalVal) c++; });
                score += [0, 0.0625, 0.125, 0.25, 0.5][c];
            } else { if(ans && ans.toString().trim().toLowerCase() === q.answer.toLowerCase()) score += 0.5; }
        });
        const finalScore = score.toFixed(1);
        const user = JSON.parse(localStorage.getItem('quiz_user'));
        if (currentUser) {
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'results'), {
                    sbd: user.sbd, name: user.name, class: user.class, school: user.school,
                    score: parseFloat(finalScore), timestamp: serverTimestamp()
                });
            } catch (e) { console.error(e); }
        }
        document.getElementById('screen-quiz').classList.remove('active');
        document.getElementById('screen-result').classList.add('active');
        document.getElementById('result-score').innerText = finalScore;
        document.getElementById('result-rank').innerText = score>=6?"XUẤT SẮC":score>=5?"GIỎI":score>=4?"KHÁ":score>=3?"ĐẠT":"CHƯA ĐẠT";
        document.getElementById('result-congrats').innerText = `Chúc mừng ${user.name}!`;

        let hist = '<h3 style="font-size: 1.1rem; margin-top: 10px;">Hướng dẫn giải chi tiết:</h3>';
        currentQuestions.forEach((q, i) => {
            const userAns = userAnswers[i];
            hist += `<div class="history-item">
                <span class="history-item-q">Câu ${i+1}: ${q.question || q.context}</span>`;
            
            if(q.shuffledOptions) {
                const corrTxt = q.shuffledOptions[q.shuffledCorrect].text;
                const userTxt = userAns !== null ? q.shuffledOptions[userAns].text : "Bỏ trống";
                hist += `Lựa chọn của bạn: <span class="${userAns===q.shuffledCorrect?'correct-ans':'wrong-ans'}">${userTxt}</span><br>
                         Đáp án đúng: <span class="correct-ans">${corrTxt}</span>`;
            } else if(q.shuffledStatements) {
                q.shuffledStatements.forEach((s, si) => {
                    const uVal = userAns ? userAns[si] : null;
                    const uStr = uVal === null ? "..." : (uVal ? "Đúng" : "Sai");
                    const cStr = s.originalVal ? "Đúng" : "Sai";
                    hist += `<div style="font-size: 0.85rem; margin-top:5px;">- ${s.text}: <b>${uStr}</b> (Đáp án: <b>${cStr}</b>) ${uVal===s.originalVal?'✅':'❌'}</div>`;
                });
            } else {
                hist += `Bạn nhập: <span class="${userAns?.toString().trim().toLowerCase()===q.answer.toLowerCase()?'correct-ans':'wrong-ans'}">${userAns || "Trống"}</span><br>
                         Đáp án: <span class="correct-ans">${q.answer}</span>`;
            }
            hist += `<div class="explanation-box">${q.explanation}</div></div>`;
        });
        document.getElementById('result-history').innerHTML = hist;
        if(window.MathJax) MathJax.typesetPromise();
    };

    const openAdminLogin = () => {
        document.getElementById('modal-admin-login').style.display = 'flex';
        document.getElementById('admin-password').focus();
    };

    const checkAdminPassword = () => {
        if(document.getElementById('admin-password').value === 'admin123') {
            document.getElementById('modal-admin-login').style.display = 'none';
            showAdminScreen();
        } else { alert('Mật khẩu sai!'); }
    };

    const showAdminScreen = async () => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-admin').classList.add('active');
        document.getElementById('user-bar').style.display = 'none';
        const content = document.getElementById('admin-results-content');
        content.innerHTML = '<p>Đang tải...</p>';
        try {
            const querySnapshot = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'results'));
            let results = [];
            querySnapshot.forEach((doc) => results.push(doc.data()));
            results.sort((a, b) => b.score - a.score);
            if(results.length === 0) {
                content.innerHTML = '<p>Chưa có dữ liệu.</p>';
                document.getElementById('admin-total-students').innerText = "Tổng: 0";
                return;
            }
            document.getElementById('admin-total-students').innerText = `Tổng: ${results.length}`;
            let tableHtml = `<table class="admin-table"><thead><tr><th>Hạng</th><th>Họ Tên</th><th>Trường</th><th>SBD</th><th>Điểm</th><th>Thời gian</th></tr></thead><tbody>`;
            results.forEach((res, index) => {
                const date = res.timestamp ? new Date(res.timestamp.seconds * 1000).toLocaleString('vi-VN', {hour:'2-digit', minute:'2-digit', day:'2-digit', month:'2-digit'}) : '...';
                tableHtml += `<tr><td><span class="rank-badge">${index + 1}</span></td><td><b>${res.name}</b></td><td style="font-size:0.7rem;">${res.school || ''}</td><td>${res.sbd}</td><td><span class="score-badge ${res.score>=5?'score-high':'score-low'}">${res.score.toFixed(1)}</span></td><td style="font-size:0.65rem;">${date}</td></tr>`;
            });
            content.innerHTML = tableHtml + '</tbody></table>';
        } catch (e) { content.innerHTML = '<p>Lỗi.</p>'; }
    };

    const showModal = (t, b) => {
        document.getElementById('modal-title').innerText = t;
        document.getElementById('modal-body').innerText = b;
        document.getElementById('custom-modal').style.display = 'flex';
    };
    const closeModal = () => document.getElementById('custom-modal').style.display = 'none';
    const playSound = (t) => { try { document.getElementById('sound-'+t).play(); } catch(e) {} };

    document.getElementById('btn-practice').onclick = () => startApp('practice');
    document.getElementById('btn-exam').onclick = () => startApp('exam');
    document.getElementById('btn-prev').onclick = prevQuestion;
    document.getElementById('btn-next').onclick = nextQuestion;
    document.getElementById('btn-submit').onclick = () => confirm("Bạn muốn nộp bài?") && finishQuiz();
    document.getElementById('btn-close-modal').onclick = closeModal;
    document.getElementById('btn-open-admin').onclick = openAdminLogin;
    document.getElementById('btn-admin-login-confirm').onclick = checkAdminPassword;
    document.getElementById('admin-password').onkeypress = (e) => { if(e.key === 'Enter') checkAdminPassword(); };
</script>
</body>
</html>
